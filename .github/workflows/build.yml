name: Build and Analyze

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dotnet:
    name: .NET build and test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build
        run: dotnet build CognitiveMesh.sln

      - name: Test
        run: dotnet test CognitiveMesh.sln --no-build

  typescript:
    name: TypeScript validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Validate OpenAPI specs
        working-directory: docs
        run: pnpm run validate

      - name: Run tests
        working-directory: docs
        run: pnpm run test:unit

  frontend:
    name: Frontend build, lint and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/UILayer/web

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.2'
          cache: 'pnpm'
          cache-dependency-path: src/UILayer/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm exec tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: Test
        run: pnpm test -- --ci --coverage --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/UILayer/web/coverage/
          retention-days: 7

