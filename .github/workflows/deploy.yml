###############################################################################
# Cognitive Mesh - API Deploy Pipeline
#
# Flow: Build Docker -> Push to shared ACR -> Deploy staging slot -> Deploy prod.
#
# Required secrets:
#   AZURE_CLIENT_ID
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Required repository or organization variables:
#   AZURE_WEBAPP_RESOURCE_GROUP
#   COGNITIVE_MESH_API_APP_NAME
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: ["Build and Analyze"]
    types: [completed]
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      skip_slot:
        description: "Skip staging slot deployment and deploy directly to production"
        required: false
        default: "false"
        type: boolean
      image_tag:
        description: "Override image tag (default: git SHA)"
        required: false
        type: string

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  actions: read

env:
  ACR_NAME: myssharedacr
  ACR_LOGIN_SERVER: myssharedacr.azurecr.io
  IMAGE_NAME: cognitive-mesh-api
  PRODUCTION_URL: https://cognitive-mesh-api-prod.azurewebsites.net
  SLOT_URL: https://cognitive-mesh-api-prod-staging.azurewebsites.net

jobs:
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image metadata
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          IMAGE_REF="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE_REF}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to shared ACR
        run: az acr login --name "${ACR_NAME}"

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-slot:
    name: Deploy API to Staging Slot
    needs: build-and-push
    if: github.event_name != 'workflow_dispatch' || inputs.skip_slot != true
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cognitive-mesh-api-prod-staging.azurewebsites.net

    steps:
      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure staging slot container
        run: |
          az webapp config container set \
            --resource-group "${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.COGNITIVE_MESH_API_APP_NAME }}" \
            --slot staging \
            --container-image-name "${{ needs.build-and-push.outputs.image_ref }}" \
            --container-registry-url "https://${ACR_LOGIN_SERVER}"
          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.COGNITIVE_MESH_API_APP_NAME }}" \
            --slot staging \
            --settings \
              WEBSITES_PORT=8080 \
              ASPNETCORE_URLS=http://+:8080 \
              Cors__AllowedOrigins__0=https://cognitive-mesh-frontend-prod.azurewebsites.net \
              Cors__AllowedOrigins__1=https://cognitive-mesh-frontend-prod-staging.azurewebsites.net \
              Cors__AllowedOrigins__2=https://cognitive-mesh.neuralliquid.ai \
              Cors__AllowedOrigins__3=https://control.cognitive-mesh.neuralliquid.ai \
              Cors__AllowedOrigins__4=https://cognitivemesh.neuralliquid.ai \
              Cors__AllowedOrigins__5=https://app.cognitivemesh.neuralliquid.ai \
              Cors__AllowedOrigins__6=https://frontend.cognitivemesh.neuralliquid.ai

      - name: Restart staging slot
        run: |
          az webapp restart \
            --resource-group "${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.COGNITIVE_MESH_API_APP_NAME }}" \
            --slot staging

      - name: Verify staging slot health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "${SLOT_URL}/healthz"; then
              echo "Staging slot health check passed"
              exit 0
            fi
            echo "Waiting for staging slot... ($i/30)"
            sleep 10
          done
          echo "Staging slot health check failed"
          exit 1

  deploy-production:
    name: Deploy API to Production
    needs: [build-and-push, deploy-slot]
    if: always() && needs.build-and-push.result == 'success' && (needs.deploy-slot.result == 'success' || needs.deploy-slot.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cognitive-mesh-api-prod.azurewebsites.net

    steps:
      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure production container
        run: |
          az webapp config container set \
            --resource-group "${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.COGNITIVE_MESH_API_APP_NAME }}" \
            --container-image-name "${{ needs.build-and-push.outputs.image_ref }}" \
            --container-registry-url "https://${ACR_LOGIN_SERVER}"
          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.COGNITIVE_MESH_API_APP_NAME }}" \
            --settings \
              WEBSITES_PORT=8080 \
              ASPNETCORE_URLS=http://+:8080 \
              Cors__AllowedOrigins__0=https://cognitive-mesh-frontend-prod.azurewebsites.net \
              Cors__AllowedOrigins__1=https://cognitive-mesh-frontend-prod-staging.azurewebsites.net \
              Cors__AllowedOrigins__2=https://cognitive-mesh.neuralliquid.ai \
              Cors__AllowedOrigins__3=https://control.cognitive-mesh.neuralliquid.ai \
              Cors__AllowedOrigins__4=https://cognitivemesh.neuralliquid.ai \
              Cors__AllowedOrigins__5=https://app.cognitivemesh.neuralliquid.ai \
              Cors__AllowedOrigins__6=https://frontend.cognitivemesh.neuralliquid.ai

      - name: Restart production
        run: |
          az webapp restart \
            --resource-group "${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.COGNITIVE_MESH_API_APP_NAME }}"

      - name: Verify production health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "${PRODUCTION_URL}/healthz"; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Waiting for production... ($i/30)"
            sleep 10
          done
          echo "Production health check failed"
          exit 1
